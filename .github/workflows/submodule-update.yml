name: Submodule Update

on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches:
      - v4
    paths:
      - content
  workflow_dispatch:

jobs:
  submodule-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Update content submodule
        run: |
          git submodule update --remote --merge content
          if [ -n "$(git status --porcelain content)" ]; then
            git add content
            git commit -m "Update content submodule"
            git push origin HEAD:v4
          else
            echo "No submodule update available"
          fi

      - name: Build Quartz
        run: |
          npx quartz build
