name: oracle_build

on:
  push:
    branches:
      - v4 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.ORACLE_SSH }}  

      - name: Run build quartz
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@167.234.237.175 << 'EOF'
              set -e
              cd /home/ubuntu/digital-garden
              git pull --ff-only --recurse-submodules
              git submodule update --init --recursive
              npx quartz build
          EOF
